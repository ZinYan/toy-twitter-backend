name: Deploy to EC2

on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/toy-twitter-backend

            git fetch origin
            git checkout deploy
            git pull origin deploy

            chmod +x gradlew
            ./gradlew bootJar -x test

            sudo fuser -k 8080/tcp || true

            source ~/.bashrc

            nohup java -Dfile.encoding=UTF-8 \
              -jar build/libs/*.jar \
              > /home/ubuntu/toy-twitter-backend/app.log 2>&1 &

            sleep 10

            curl -f http://localhost:8080/tweets